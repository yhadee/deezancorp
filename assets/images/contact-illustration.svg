<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="contactBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0052cc" />
    </linearGradient>
    <linearGradient id="contactTealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4b2" />
      <stop offset="100%" stop-color="#00b395" />
    </linearGradient>
    <filter id="contactShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.07" />
    </filter>
  </defs>

  <!-- Background communication waves -->
  <g opacity="0.15">
    <path d="M 100,250 C 200,150 400,150 500,250" fill="none" stroke="#0066ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" />
    <path d="M 150,250 C 220,180 380,180 450,250" fill="none" stroke="#00d4b2" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Main Envelop/Message element -->
  <g filter="url(#contactShadow)" transform="translate(130, 110)">
    <!-- Base Board -->
    <rect x="0" y="0" width="340" height="240" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    
    <!-- Letter / Envelope design -->
    <rect x="30" y="50" width="280" height="150" rx="8" fill="url(#contactBlueGrad)" />
    
    <!-- Envelope flaps -->
    <path d="M 30,50 L 170,130 L 310,50" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <path d="M 30,200 L 120,130" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <path d="M 310,200 L 220,130" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />

    <!-- Sending success check circle inside stamp space -->
    <circle cx="260" cy="90" r="22" fill="#ffffff" />
    <path d="M 252,90 L 258,96 L 268,84" fill="none" stroke="#00d4b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Location Pin element (Floating) -->
  <g filter="url(#contactShadow)" transform="translate(80, 270)">
    <circle cx="35" cy="35" r="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <!-- Pin Shape -->
    <path d="M 35,18 C 26,18 20,24 20,32 C 20,42 35,52 35,52 C 35,52 50,42 50,32 C 50,24 44,18 35,18 Z" fill="url(#contactTealGrad)" />
    <circle cx="35" cy="30" r="5" fill="#ffffff" />
  </g>

  <!-- Chat / Bubble element (Floating) -->
  <g filter="url(#contactShadow)" transform="translate(420, 80)">
    <circle cx="45" cy="45" r="45" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <!-- Speech bubbles -->
    <path d="M 32,45 C 32,38 38,33 46,33 C 54,33 60,38 60,45 C 60,52 54,57 46,57 C 44,57 42,56 40,55 L 35,58 L 36,53 C 34,51 32,48 32,45 Z" fill="url(#contactBlueGrad)" />
    <path d="M 46,38 L 46,38" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
