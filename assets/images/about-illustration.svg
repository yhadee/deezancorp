<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aboutBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0052cc" />
    </linearGradient>
    <linearGradient id="aboutTealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4b2" />
      <stop offset="100%" stop-color="#00b395" />
    </linearGradient>
    <filter id="aboutShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
  </defs>

  <!-- Background base grid -->
  <g opacity="0.2">
    <circle cx="300" cy="250" r="180" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="8 4" />
    <circle cx="300" cy="250" r="100" fill="none" stroke="#e2e8f0" stroke-width="1" />
  </g>

  <!-- Growth Graph (Representing Progress / Timeline) -->
  <g filter="url(#aboutShadow)" transform="translate(80, 100)">
    <!-- Main board background -->
    <rect x="0" y="0" width="440" height="300" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    
    <!-- Grid line markers inside board -->
    <path d="M 40,50 L 400,50 M 40,110 L 400,110 M 40,170 L 400,170 M 40,230 L 400,230" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Growth Path Line -->
    <path d="M 50,230 Q 120,200 180,130 T 310,90 T 390,40" fill="none" stroke="url(#aboutBlueGrad)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Highlight points with pulses -->
    <!-- Point 1 -->
    <circle cx="50" cy="230" r="10" fill="url(#aboutBlueGrad)" opacity="0.3" />
    <circle cx="50" cy="230" r="5" fill="#0066ff" />
    
    <!-- Point 2 -->
    <circle cx="180" cy="130" r="12" fill="url(#aboutTealGrad)" opacity="0.3" />
    <circle cx="180" cy="130" r="6" fill="#00d4b2" />

    <!-- Point 3 -->
    <circle cx="310" cy="90" r="12" fill="url(#aboutBlueGrad)" opacity="0.3" />
    <circle cx="310" cy="90" r="6" fill="#0066ff" />

    <!-- Point 4 (Goal) -->
    <circle cx="390" cy="40" r="16" fill="url(#aboutTealGrad)" opacity="0.3" />
    <circle cx="390" cy="40" r="8" fill="#00d4b2" />

    <!-- X/Y Axis labels (Mock years) -->
    <text x="40" y="260" font-family="sans-serif" font-size="10" fill="#94a3b8" font-weight="bold">2021</text>
    <text x="170" y="260" font-family="sans-serif" font-size="10" fill="#94a3b8" font-weight="bold">2023</text>
    <text x="300" y="260" font-family="sans-serif" font-size="10" fill="#94a3b8" font-weight="bold">2025</text>
    <text x="375" y="260" font-family="sans-serif" font-size="10" fill="#94a3b8" font-weight="bold">FUTURE</text>
  </g>

  <!-- Interactive elements floating around -->
  <!-- Target Target/Bullseye Graphic -->
  <g filter="url(#aboutShadow)" transform="translate(50, 60)">
    <circle cx="35" cy="35" r="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <circle cx="35" cy="35" r="25" fill="#0066ff" opacity="0.1" />
    <circle cx="35" cy="35" r="15" fill="none" stroke="#0066ff" stroke-width="3" />
    <circle cx="35" cy="35" r="5" fill="#0066ff" />
  </g>

  <!-- Shield/Security Graphic -->
  <g filter="url(#aboutShadow)" transform="translate(460, 310)">
    <circle cx="40" cy="40" r="40" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <!-- Checkmark Shield -->
    <path d="M 28,30 C 28,30 35,27 40,25 C 45,27 52,30 52,30 C 52,38 49,48 40,53 C 31,48 28,38 28,30 Z" fill="none" stroke="#00d4b2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 35,39 L 38,42 L 45,35" fill="none" stroke="#00d4b2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Team Collaboration speech/idea bubble -->
  <g filter="url(#aboutShadow)" transform="translate(480, 70)">
    <rect x="0" y="0" width="70" height="60" rx="12" fill="url(#aboutBlueGrad)" />
    <!-- Speech bubble triangle tail -->
    <path d="M 20,60 L 30,60 L 25,68 Z" fill="#0052cc" />
    <!-- Lightbulb SVG path -->
    <path d="M 35,18 C 30,18 27,21 27,26 C 27,29 29,31 31,33 L 31,37 L 39,37 L 39,33 C 41,31 43,29 43,26 C 43,21 40,18 35,18 Z" fill="#ffffff" />
    <rect x="32" y="39" width="6" height="3" rx="1.5" fill="#ffffff" />
  </g>
</svg>
