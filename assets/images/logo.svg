<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient for Main Wave -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0052cc" />
    </linearGradient>
    <!-- Gradient for Accent Wave -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4b2" />
      <stop offset="100%" stop-color="#00b395" />
    </linearGradient>
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0066ff" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Background Layer (Optional, transparent by default, but let's keep logo clean) -->
  <g filter="url(#dropShadow)">
    <!-- Base Node Circle (Stylized) -->
    <circle cx="160" cy="256" r="48" fill="url(#waveGrad)" />
    
    <!-- Wave Shape 1 (Back Wave) -->
    <path d="M 160 256 C 240 120, 272 120, 352 256 C 432 392, 400 392, 480 256" 
          fill="none" stroke="url(#accentGrad)" stroke-width="36" stroke-linecap="round" />
          
    <!-- Wave Shape 2 (Front Wave) -->
    <path d="M 32 256 C 112 120, 144 120, 224 256 C 304 392, 272 392, 352 256" 
          fill="none" stroke="url(#waveGrad)" stroke-width="40" stroke-linecap="round" />
          
    <!-- Terminal Node Circle (Stylized) -->
    <circle cx="352" cy="256" r="52" fill="url(#accentGrad)" />
    <circle cx="352" cy="256" r="24" fill="#ffffff" />
  </g>
</svg>
