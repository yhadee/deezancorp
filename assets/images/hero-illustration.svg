<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="heroBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0052cc" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="heroTealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4b2" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00b395" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bgGrad)" />

  <!-- Animated floating shapes / grid -->
  <g opacity="0.3">
    <circle cx="100" cy="150" r="4" fill="#0066ff" />
    <circle cx="150" cy="80" r="6" fill="#00d4b2" />
    <circle cx="520" cy="120" r="5" fill="#0066ff" />
    <circle cx="480" cy="380" r="7" fill="#00d4b2" />
    
    <!-- Grid pattern -->
    <path d="M 50,100 L 550,100 M 50,200 L 550,200 M 50,300 L 550,300 M 50,400 L 550,400" stroke="#e2e8f0" stroke-width="1" />
    <path d="M 100,50 L 100,450 M 200,50 L 200,450 M 300,50 L 300,450 M 400,50 L 400,450 M 500,50 L 500,450" stroke="#e2e8f0" stroke-width="1" />
  </g>

  <!-- Main Isometric Dashboard Window -->
  <g filter="url(#softShadow)">
    <rect x="120" y="140" width="360" height="240" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    
    <!-- Browser Header Bar -->
    <path d="M 120,170 L 480,170" stroke="#e2e8f0" stroke-width="2" />
    <!-- Window Dots -->
    <circle cx="140" cy="155" r="5" fill="#ff5f56" />
    <circle cx="155" cy="155" r="5" fill="#ffbd2e" />
    <circle cx="170" cy="155" r="5" fill="#27c93f" />
    <rect x="200" y="150" width="160" height="10" rx="5" fill="#f1f5f9" />
    
    <!-- Inside Dashboard Content -->
    <!-- Sidebar -->
    <rect x="135" y="185" width="60" height="180" rx="6" fill="#f8fafc" />
    <rect x="145" y="200" width="40" height="8" rx="4" fill="#e2e8f0" />
    <rect x="145" y="220" width="40" height="8" rx="4" fill="#e2e8f0" />
    <rect x="145" y="240" width="40" height="8" rx="4" fill="#e2e8f0" />
    
    <!-- Code Editor Mock / Lines -->
    <rect x="210" y="185" width="250" height="90" rx="6" fill="#0f172a" />
    <rect x="225" y="200" width="140" height="6" rx="3" fill="#38bdf8" />
    <rect x="225" y="215" width="180" height="6" rx="3" fill="#a78bfa" />
    <rect x="225" y="230" width="90" height="6" rx="3" fill="#34d399" />
    <rect x="225" y="245" width="160" height="6" rx="3" fill="#fb7185" />
    <rect x="225" y="260" width="110" height="6" rx="3" fill="#fbbf24" />

    <!-- Mini chart -->
    <rect x="210" y="290" width="115" height="75" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <path d="M 220,350 L 240,320 L 260,335 L 280,305 L 300,325 L 315,310" fill="none" stroke="url(#heroBlueGrad)" stroke-width="3" stroke-linecap="round" />
    <circle cx="315" cy="310" r="4" fill="#0066ff" />

    <!-- Mini Analytics bars -->
    <rect x="345" y="290" width="115" height="75" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <rect x="360" y="330" width="15" height="25" rx="2" fill="url(#heroTealGrad)" />
    <rect x="385" y="315" width="15" height="40" rx="2" fill="url(#heroTealGrad)" />
    <rect x="410" y="305" width="15" height="50" rx="2" fill="url(#heroBlueGrad)" />
    <rect x="435" y="325" width="15" height="30" rx="2" fill="url(#heroTealGrad)" />
  </g>

  <!-- Foreground Floating Elements -->
  <!-- Floating Mobile Mockup -->
  <g filter="url(#softShadow)" transform="translate(60, 220)">
    <rect x="0" y="0" width="90" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
    <rect x="5" y="5" width="80" height="160" rx="12" fill="#f8fafc" />
    <!-- Speaker/Camera -->
    <rect x="35" y="10" width="20" height="4" rx="2" fill="#e2e8f0" />
    <!-- Mobile App Content -->
    <circle cx="45" cy="55" r="24" fill="url(#heroBlueGrad)" />
    <path d="M 38,55 L 43,60 L 52,50" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="15" y="95" width="60" height="8" rx="4" fill="#e2e8f0" />
    <rect x="20" y="110" width="50" height="8" rx="4" fill="#00d4b2" />
    <rect x="25" y="130" width="40" height="16" rx="8" fill="#0066ff" />
  </g>

  <!-- Floating Database Cloud Element -->
  <g filter="url(#softShadow)" transform="translate(420, 80)">
    <rect x="0" y="0" width="110" height="90" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <!-- Database cylinders -->
    <rect x="25" y="15" width="60" height="16" rx="4" fill="url(#heroBlueGrad)" />
    <ellipse cx="55" cy="15" rx="30" ry="4" fill="#ffffff" opacity="0.4" />
    
    <rect x="25" y="38" width="60" height="16" rx="4" fill="url(#heroBlueGrad)" />
    <ellipse cx="55" cy="38" rx="30" ry="4" fill="#ffffff" opacity="0.4" />

    <rect x="25" y="61" width="60" height="16" rx="4" fill="url(#heroTealGrad)" />
    <ellipse cx="55" cy="61" rx="30" ry="4" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Code Tag graphic overlay -->
  <g filter="url(#softShadow)" transform="translate(460, 270)">
    <circle cx="30" cy="30" r="30" fill="url(#heroTealGrad)" />
    <!-- Code brackets sign < / > -->
    <path d="M 20,22 L 12,30 L 20,38" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 40,22 L 48,30 L 40,38" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 33,20 L 27,40" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
